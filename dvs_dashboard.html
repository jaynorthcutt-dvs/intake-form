<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DVS Health — Client Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Outfit:wght@300;400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Outfit', sans-serif; background: #0d1117; color: #f1f5f9; min-height: 100vh; }

  /* ── LOGIN ── */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 2rem;
  }
  .login-box {
    background: #161b27; border: 0.5px solid #2a3347; border-radius: 16px;
    padding: 2.5rem; width: 100%; max-width: 380px; text-align: center;
  }
  .login-box .logo { font-family: 'Playfair Display', serif; font-size: 28px; color: #93c5fd; margin-bottom: 6px; }
  .login-box .sub { font-size: 12px; color: #64748b; margin-bottom: 2rem; letter-spacing: 0.06em; text-transform: uppercase; }
  .login-box input {
    width: 100%; padding: 12px 14px; background: #0d1117; border: 0.5px solid #2a3347;
    border-radius: 8px; color: #f1f5f9; font-family: 'Outfit', sans-serif; font-size: 15px;
    margin-bottom: 12px; outline: none; text-align: center; letter-spacing: 0.1em;
  }
  .login-box input:focus { border-color: #3a5a8c; }
  .login-btn {
    width: 100%; background: #1e2d4a; color: #93c5fd; border: 1px solid #3a5a8c;
    border-radius: 8px; padding: 12px; font-family: 'Outfit', sans-serif; font-size: 15px;
    font-weight: 500; cursor: pointer; transition: background 0.15s;
  }
  .login-btn:hover { background: #2a3d5c; }
  .login-error { font-size: 12px; color: #f87171; margin-top: 10px; display: none; }

  /* ── DASHBOARD ── */
  #dashboard { display: none; }
  .topbar {
    background: #161b27; border-bottom: 0.5px solid #2a3347;
    padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
  }
  .topbar-left h1 { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 400; color: #f1f5f9; }
  .topbar-left p { font-size: 12px; color: #64748b; margin-top: 2px; }
  .topbar-right { display: flex; gap: 10px; align-items: center; }
  .logout-btn {
    background: none; border: 0.5px solid #2a3347; border-radius: 6px;
    color: #64748b; font-family: 'Outfit', sans-serif; font-size: 12px;
    padding: 6px 12px; cursor: pointer; transition: all 0.15s;
  }
  .logout-btn:hover { border-color: #f87171; color: #f87171; }

  .main { padding: 1.5rem 2rem; max-width: 1200px; margin: 0 auto; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
  .stat-card { background: #161b27; border: 0.5px solid #2a3347; border-radius: 10px; padding: 1rem 1.25rem; }
  .stat-card .num { font-family: 'Playfair Display', serif; font-size: 28px; color: #93c5fd; line-height: 1; }
  .stat-card .lbl { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; }

  /* Search & filters */
  .toolbar { display: flex; gap: 10px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .search-box {
    flex: 1; min-width: 200px; padding: 10px 14px; background: #161b27;
    border: 0.5px solid #2a3347; border-radius: 8px; color: #f1f5f9;
    font-family: 'Outfit', sans-serif; font-size: 14px; outline: none;
  }
  .search-box:focus { border-color: #3a5a8c; }
  .filter-select {
    padding: 10px 14px; background: #161b27; border: 0.5px solid #2a3347;
    border-radius: 8px; color: #f1f5f9; font-family: 'Outfit', sans-serif; font-size: 14px; outline: none;
  }
  .refresh-btn {
    padding: 10px 18px; background: #1e2d4a; border: 1px solid #3a5a8c;
    border-radius: 8px; color: #93c5fd; font-family: 'Outfit', sans-serif;
    font-size: 14px; cursor: pointer; transition: background 0.15s;
  }
  .refresh-btn:hover { background: #2a3d5c; }

  /* Client list */
  .client-table { width: 100%; border-collapse: collapse; }
  .client-table th {
    text-align: left; font-size: 11px; color: #64748b; letter-spacing: 0.06em;
    text-transform: uppercase; padding: 10px 14px; border-bottom: 0.5px solid #2a3347;
    font-weight: 500; background: #161b27;
  }
  .client-table td { padding: 12px 14px; border-bottom: 0.5px solid #1a2035; color: #cbd5e1; font-size: 14px; vertical-align: middle; }
  .client-table tr:hover td { background: #161b27; cursor: pointer; }
  .client-table tr:last-child td { border-bottom: none; }
  .table-wrap { background: #0d1117; border: 0.5px solid #2a3347; border-radius: 12px; overflow: hidden; }

  .badge-carrier { background: #1e2d4a; color: #93c5fd; font-size: 11px; padding: 3px 8px; border-radius: 4px; }
  .badge-tier { font-size: 11px; padding: 3px 8px; border-radius: 4px; }
  .badge-tier.bronze { background: #2d1f0d; color: #d97706; }
  .badge-tier.silver { background: #1a1f2a; color: #94a3b8; }
  .badge-tier.gold { background: #2a2000; color: #fbbf24; }
  .badge-tier.platinum { background: #0d2a1f; color: #34d399; }
  .badge-tier.csr { background: #1a0d2a; color: #a78bfa; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75); z-index: 100; padding: 1rem; overflow-y: auto;
  }
  .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; padding-top: 2rem; }
  .modal {
    background: #161b27; border: 0.5px solid #2a3347; border-radius: 16px;
    width: 100%; max-width: 700px; padding: 2rem; position: relative;
  }
  .modal-close {
    position: absolute; top: 1rem; right: 1rem; background: none; border: none;
    color: #64748b; font-size: 20px; cursor: pointer; line-height: 1;
  }
  .modal-close:hover { color: #f87171; }
  .modal-name { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 400; color: #f1f5f9; margin-bottom: 4px; }
  .modal-sub { font-size: 12px; color: #64748b; margin-bottom: 1.5rem; }
  .modal-section { margin-bottom: 1.25rem; }
  .modal-section-title { font-size: 11px; color: #93c5fd; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 0.5px solid #2a3347; }
  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-grid.thirds { grid-template-columns: 1fr 1fr 1fr; }
  .modal-field label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.04em; display: block; margin-bottom: 3px; }
  .modal-field span { font-size: 14px; color: #f1f5f9; }
  .sensitive { font-family: monospace; color: #93c5fd; letter-spacing: 0.1em; }
  .modal table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .modal th { text-align: left; font-size: 11px; color: #64748b; letter-spacing: 0.06em; text-transform: uppercase; padding: 8px 10px; border-bottom: 0.5px solid #2a3347; }
  .modal td { padding: 8px 10px; border-bottom: 0.5px solid #1a2035; color: #cbd5e1; }
  .modal tr:last-child td { border-bottom: none; }

  .loading { text-align: center; padding: 3rem; color: #64748b; font-size: 14px; }
  .empty { text-align: center; padding: 3rem; color: #64748b; font-size: 14px; }

  @media (max-width: 640px) {
    .main { padding: 1rem; }
    .stats { grid-template-columns: 1fr 1fr; }
    .modal-grid, .modal-grid.thirds { grid-template-columns: 1fr; }
    .client-table th:nth-child(n+4), .client-table td:nth-child(n+4) { display: none; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo">DVS Health</div>
    <div class="sub">Client Dashboard · Secure Access</div>
    <input type="password" id="password-input" placeholder="Enter password" onkeydown="if(event.key==='Enter') tryLogin()">
    <button class="login-btn" onclick="tryLogin()">Access Dashboard</button>
    <div class="login-error" id="login-error">Incorrect password. Try again.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-left">
      <h1>DVS Health — Client Dashboard</h1>
      <p id="last-updated">Loading...</p>
    </div>
    <div class="topbar-right">
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
      <button class="logout-btn" onclick="logout()">Log out</button>
    </div>
  </div>

  <div class="main">
    <div class="stats">
      <div class="stat-card"><div class="num" id="stat-total">—</div><div class="lbl">Total Clients</div></div>
      <div class="stat-card"><div class="num" id="stat-partners">—</div><div class="lbl">Referral Partners</div></div>
      <div class="stat-card"><div class="num" id="stat-states">—</div><div class="lbl">States</div></div>
      <div class="stat-card"><div class="num" id="stat-today">—</div><div class="lbl">Today</div></div>
    </div>

    <div class="toolbar">
      <input class="search-box" id="search-input" placeholder="Search by name, partner, carrier, state..." oninput="filterClients()">
      <select class="filter-select" id="filter-state" onchange="filterClients()">
        <option value="">All States</option>
      </select>
      <select class="filter-select" id="filter-carrier" onchange="filterClients()">
        <option value="">All Carriers</option>
      </select>
    </div>

    <div class="table-wrap">
      <div id="loading" class="loading">Loading client data...</div>
      <table class="client-table" id="client-table" style="display:none;">
        <thead>
          <tr>
            <th>Client Name</th>
            <th>State</th>
            <th>Carrier / Plan</th>
            <th>Tier</th>
            <th>Premium</th>
            <th>Effective</th>
            <th>Referred By</th>
            <th>Submitted</th>
          </tr>
        </thead>
        <tbody id="client-tbody"></tbody>
      </table>
      <div id="empty" class="empty" style="display:none;">No clients found.</div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this) closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<script>
  // ── CONFIG ──────────────────────────────────────────
  const PASSWORD = 'DVSHealth2025!';
  const SHEET_ID = '1nSBAUwxy-hUNw-uUdwLsjrIAJLljjUWe7NBCi6Mo0to';
  const SHEET_NAME = 'Client Applications';
  // ────────────────────────────────────────────────────

  let allClients = [];

  function tryLogin() {
    const val = document.getElementById('password-input').value;
    if (val === PASSWORD) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadData();
    } else {
      document.getElementById('login-error').style.display = 'block';
      document.getElementById('password-input').value = '';
    }
  }

  function logout() {
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('password-input').value = '';
  }

  function last4(val) {
    if (!val) return 'N/A';
    const clean = val.toString().replace(/[^0-9]/g, '');
    return clean.length >= 4 ? '****' + clean.slice(-4) : '****';
  }

  async function loadData() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('client-table').style.display = 'none';
    document.getElementById('empty').style.display = 'none';

    try {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
      const res = await fetch(url);
      const text = await res.text();
      const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);

      const cols = json.table.cols.map(c => c.label);
      const rows = json.table.rows || [];

      allClients = rows.map(row => {
        const obj = {};
        cols.forEach((col, i) => {
          obj[col] = row.c[i] ? (row.c[i].f || row.c[i].v || '') : '';
        });
        return obj;
      });

      // Populate filters
      const states = [...new Set(allClients.map(c => c.state || c.State).filter(Boolean))].sort();
      const carriers = [...new Set(allClients.map(c => c.carrier || c.Carrier).filter(Boolean))].sort();
      const stateEl = document.getElementById('filter-state');
      const carrierEl = document.getElementById('filter-carrier');
      stateEl.innerHTML = '<option value="">All States</option>' + states.map(s => `<option>${s}</option>`).join('');
      carrierEl.innerHTML = '<option value="">All Carriers</option>' + carriers.map(c => `<option>${c}</option>`).join('');

      updateStats();
      filterClients();

      const now = new Date();
      document.getElementById('last-updated').textContent = 'Last updated ' + now.toLocaleTimeString();
    } catch (err) {
      document.getElementById('loading').textContent = 'Could not load data. Make sure your Google Sheet is set to Anyone with the link can view.';
    }
  }

  function updateStats() {
    const today = new Date().toLocaleDateString();
    document.getElementById('stat-total').textContent = allClients.length;
    document.getElementById('stat-partners').textContent = new Set(allClients.map(c => c.referred_by || c['Referred By']).filter(Boolean)).size;
    document.getElementById('stat-states').textContent = new Set(allClients.map(c => c.state || c.State).filter(Boolean)).size;
    document.getElementById('stat-today').textContent = allClients.filter(c => {
      const sub = c.submitted || c.Submitted || '';
      return sub.toString().includes(new Date().toLocaleDateString('en-US', {month:'numeric',day:'numeric',year:'numeric'}));
    }).length;
  }

  function filterClients() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const state = document.getElementById('filter-state').value;
    const carrier = document.getElementById('filter-carrier').value;

    const filtered = allClients.filter(c => {
      const name = ((c.first_name || '') + ' ' + (c.last_name || '')).toLowerCase();
      const partner = (c.referred_by || c['Referred By'] || '').toLowerCase();
      const carr = (c.carrier || c.Carrier || '').toLowerCase();
      const st = c.state || c.State || '';
      const matchQ = !q || name.includes(q) || partner.includes(q) || carr.includes(q) || st.toLowerCase().includes(q);
      const matchState = !state || st === state;
      const matchCarrier = !carrier || carr === carrier;
      return matchQ && matchState && matchCarrier;
    });

    renderTable(filtered);
  }

  function renderTable(clients) {
    document.getElementById('loading').style.display = 'none';
    if (clients.length === 0) {
      document.getElementById('client-table').style.display = 'none';
      document.getElementById('empty').style.display = 'block';
      return;
    }
    document.getElementById('client-table').style.display = 'table';
    document.getElementById('empty').style.display = 'none';

    const tbody = document.getElementById('client-tbody');
    tbody.innerHTML = clients.map((c, idx) => {
      const tier = (c.metal_tier || c['Metal Tier'] || '').toLowerCase();
      const tierClass = tier.includes('bronze') ? 'bronze' : tier.includes('silver') ? 'silver' : tier.includes('gold') ? 'gold' : tier.includes('platinum') ? 'platinum' : tier.includes('csr') ? 'csr' : '';
      const submitted = c.submitted || c.Submitted || '';
      return `<tr onclick="openModal(${allClients.indexOf(c)})">
        <td><strong style="color:#f1f5f9;">${c.first_name || ''} ${c.last_name || ''}</strong><br><span style="font-size:11px;color:#64748b;">${c.phone || ''}</span></td>
        <td>${c.state || c.State || '—'}</td>
        <td><span class="badge-carrier">${c.carrier || c.Carrier || '—'}</span><br><span style="font-size:11px;color:#64748b;">${c.plan_name || c['Plan Name'] || ''}</span></td>
        <td><span class="badge-tier ${tierClass}">${c.metal_tier || c['Metal Tier'] || '—'}</span></td>
        <td>${c.monthly_premium || c['Monthly Premium'] || '—'}</td>
        <td>${c.effective_date || c['Effective Date'] || '—'}</td>
        <td style="font-size:13px;">${c.referred_by || c['Referred By'] || '—'}</td>
        <td style="font-size:12px;color:#64748b;">${submitted}</td>
      </tr>`;
    }).join('');
  }

  function openModal(idx) {
    const c = allClients[idx];
    if (!c) return;

    // Build household members rows
    let membersHTML = '';
    if (c.adult1_first) membersHTML += `<tr><td>${c.adult1_first} ${c.adult1_last||''}</td><td>${c.adult1_rel||''}</td><td>${c.adult1_dob||''}</td><td class="sensitive">${last4(c.adult1_ssn)}</td><td>Secondary</td></tr>`;
    for (let i=1;i<=5;i++) { if(c['dep'+i+'_first']) membersHTML += `<tr><td>${c['dep'+i+'_first']} ${c['dep'+i+'_last']||''}</td><td>${c['dep'+i+'_rel']||''}</td><td>${c['dep'+i+'_dob']||''}</td><td class="sensitive">${last4(c['dep'+i+'_ssn'])}</td><td>Applying Dep.</td></tr>`; }
    for (let i=1;i<=9;i++) { if(c['na_dep'+i+'_first']) membersHTML += `<tr><td>${c['na_dep'+i+'_first']} ${c['na_dep'+i+'_last']||''}</td><td>${c['na_dep'+i+'_rel']||''}</td><td>${c['na_dep'+i+'_dob']||''}</td><td class="sensitive">${last4(c['na_dep'+i+'_ssn'])}</td><td>Non-Applying</td></tr>`; }

    // Income rows
    let incomeHTML = `<tr><td>${c.first_name||''} ${c.last_name||''} (Primary)</td><td>${c.employment_status||''}</td><td>${c.employer||c.type_of_work||'N/A'}</td><td>$${c.annual_income||'0'}</td></tr>`;
    if (c.adult1_first) incomeHTML += `<tr><td>${c.adult1_first} ${c.adult1_last||''} (Secondary)</td><td>${c.adult1_employment||'N/A'}</td><td>N/A</td><td>N/A</td></tr>`;
    for (let i=1;i<=9;i++) { if(c['hh'+i+'_employment']) incomeHTML += `<tr><td>HH Member ${i+1}</td><td>${c['hh'+i+'_employment']}</td><td>${c['hh'+i+'_type_of_work']||c['hh'+i+'_employer']||'N/A'}</td><td>$${c['hh'+i+'_annual_income']||'0'}</td></tr>`; }

    document.getElementById('modal-content').innerHTML = `
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-name">${c.first_name||''} ${c.middle_name||''} ${c.last_name||''}</div>
      <div class="modal-sub">Submitted ${c.submitted||c.Submitted||''} &nbsp;·&nbsp; Referred by ${c.referred_by||c['Referred By']||'N/A'}</div>

      <div class="modal-section">
        <div class="modal-section-title">Referral Partner</div>
        <div class="modal-grid">
          <div class="modal-field"><label>Contact</label><span>${c.referred_by||c['Referred By']||'N/A'}</span></div>
          <div class="modal-field"><label>Organization</label><span>${c.partner_name||'N/A'}</span></div>
          <div class="modal-field"><label>Email</label><span>${c.partner_email||'N/A'}</span></div>
          <div class="modal-field"><label>Phone</label><span>${c.partner_phone||'N/A'}</span></div>
        </div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Primary Applicant</div>
        <div class="modal-grid thirds">
          <div class="modal-field"><label>DOB</label><span>${c.dob||'N/A'}</span></div>
          <div class="modal-field"><label>Sex / Gender</label><span>${c.sex||''} / ${c.gender||''}</span></div>
          <div class="modal-field"><label>SSN (Last 4)</label><span class="sensitive">${last4(c.ssn)}</span></div>
          <div class="modal-field"><label>Phone</label><span>${c.phone||'N/A'}</span></div>
          <div class="modal-field"><label>Email</label><span>${c.email||'N/A'}</span></div>
          <div class="modal-field"><label>Citizenship</label><span>${c.citizenship||'N/A'}</span></div>
        </div>
        <div class="modal-field" style="margin-top:8px;"><label>Address</label><span>${c.address||'N/A'}</span></div>
        <div class="modal-field" style="margin-top:6px;"><label>State</label><span>${c.state||c.State||'N/A'}</span></div>
      </div>

      ${membersHTML ? `<div class="modal-section">
        <div class="modal-section-title">Household Members</div>
        <table><thead><tr><th>Name</th><th>Relationship</th><th>DOB</th><th>SSN Last 4</th><th>Status</th></tr></thead>
        <tbody>${membersHTML}</tbody></table>
      </div>` : ''}

      <div class="modal-section">
        <div class="modal-section-title">Coverage</div>
        <div class="modal-grid thirds">
          <div class="modal-field"><label>Adults Applying</label><span>${c.adults_applying||'N/A'}</span></div>
          <div class="modal-field"><label>Dependents</label><span>${c.dependents_applying||'0'}</span></div>
          <div class="modal-field"><label>Household Size</label><span>${c.household_size||'N/A'}</span></div>
        </div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Income &amp; Employment</div>
        <table><thead><tr><th>Member</th><th>Employment</th><th>Employer/Work</th><th>Annual Income</th></tr></thead>
        <tbody>${incomeHTML}</tbody></table>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Plan Choice</div>
        <div class="modal-grid thirds">
          <div class="modal-field"><label>Carrier</label><span>${c.carrier||'N/A'}${c.carrier_other?' ('+c.carrier_other+')':''}</span></div>
          <div class="modal-field"><label>Plan Name</label><span>${c.plan_name||'N/A'}</span></div>
          <div class="modal-field"><label>Metal Tier</label><span>${c.metal_tier||'N/A'}</span></div>
          <div class="modal-field"><label>Monthly Premium</label><span>${c.monthly_premium||'N/A'}</span></div>
          <div class="modal-field"><label>Draft Date</label><span>${c.draft_date||'N/A'}</span></div>
          <div class="modal-field"><label>Effective Date</label><span>${c.effective_date||'N/A'}</span></div>
        </div>
        ${c.plan_notes ? '<div class="modal-field" style="margin-top:8px;"><label>Notes</label><span>'+c.plan_notes+'</span></div>' : ''}
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Payment (Last 4 Only)</div>
        <div class="modal-grid">
          ${c.bank_name ? `<div class="modal-field"><label>Bank</label><span>${c.bank_name}</span></div>
          <div class="modal-field"><label>Account Type</label><span>${c.account_type||'N/A'}</span></div>
          <div class="modal-field"><label>Routing #</label><span class="sensitive">${last4(c.routing_number)}</span></div>
          <div class="modal-field"><label>Account #</label><span class="sensitive">${last4(c.account_number)}</span></div>` : ''}
          ${c.card_type ? `<div class="modal-field"><label>Card Type</label><span>${c.card_type}</span></div>
          <div class="modal-field"><label>Card #</label><span class="sensitive">${last4(c.card_number)}</span></div>
          <div class="modal-field"><label>Expiry</label><span>${c.card_expiry||'N/A'}</span></div>
          <div class="modal-field"><label>Billing ZIP</label><span>${c.card_zip||'N/A'}</span></div>` : ''}
        </div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Authorization</div>
        <div class="modal-grid">
          <div class="modal-field"><label>Signature</label><span>${c.signature||'N/A'}</span></div>
          <div class="modal-field"><label>Date Signed</label><span>${c.sig_date||'N/A'}</span></div>
        </div>
      </div>
    `;

    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });
</script>
</body>
</html>
